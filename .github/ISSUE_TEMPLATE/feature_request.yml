name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests focused. Larger changes are easier to discuss when the user problem is clear.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Catalyst do differently?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but useful for provider, billing, security or deployment changes.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - collectors
        - AI scoring
        - dashboard
        - admin
        - alerts / delivery
        - billing
        - deployment
        - documentation
        - security
        - other

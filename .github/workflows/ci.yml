name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Node checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate embedded SPAs
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Syntax check JavaScript files
        shell: bash
        run: git ls-files '*.js' '*.mjs' '*.cjs' | xargs -r -n 1 node --check

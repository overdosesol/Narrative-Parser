services:
  catalyst:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalyst-app
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=1024"
      DB_PATH: /data/catalyst.db
      LOG_FILE: /logs/catalyst.log
      DASHBOARD_PORT: 8080
      DASHBOARD_HOST: 0.0.0.0
      ADMIN_PORT: 8081
      ADMIN_HOST: 0.0.0.0
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      GROK_CLI_CWD: /app
    
    ports:
      - "127.0.0.1:8080:8080"  # Main Dashboard (only via nginx with TLS)
      - "127.0.0.1:8081:8081"  # Admin Panel (localhost only)
    
    volumes:
      # Персистентные данные
      - catalyst_data:/data
      # Логи
      - catalyst_logs:/logs
      # Grok CLI сессия (operator runs `grok login --device-auth` once on host)
      - /root/.grok:/home/node/.grok
    
    # Ограничение ресурсов
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    
    # Network
    networks:
      - catalyst
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    # Логирование (Docker stdout ring buffer)
    # 50m × 5 = 250 MB total. NB: это только для `docker logs` —
    # приложение всё равно пишет в /logs/{date}.log в named volume,
    # который переживает ребилды и хранит полную историю по дням.
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "app=catalyst"

volumes:
  catalyst_data:
    driver: local
  catalyst_logs:
    driver: local

networks:
  catalyst:
    driver: bridge
